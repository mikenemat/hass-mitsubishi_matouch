get_telemetry:
  name: Get telemetry
  description: >-
    Return recent MA Touch BLE connection telemetry (connect/disconnect/poll
    events) for R&D export. Call with response data enabled.
  fields:
    mac:
      name: MAC address
      description: Optional - filter to a single thermostat's MAC address.
      required: false
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    limit:
      name: Limit
      description: Maximum number of recent events to return.
      required: false
      default: 300
      selector:
        number:
          min: 1
          max: 1000
          mode: box
