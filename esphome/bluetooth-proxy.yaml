# OPTIONAL self-managed ESPHome Bluetooth Proxy config.
#
# Most people do NOT need this file. Just use the official web installer ---
# https://esphome.github.io/bluetooth-proxies/ --- which flashes a ready-made,
# correctly-configured active Bluetooth proxy in one click. You don't set any scan
# intervals, windows, or other parameters; the defaults work (that's why a flasher
# proxy "just works" after you add it to Home Assistant).
#
# This file is here ONLY for people who'd rather manage the proxy in their own
# ESPHome dashboard. If so: give each board a unique name (bt-proxy-1, bt-proxy-2,
# ...) and add a secrets.yaml with wifi_ssid, wifi_password, api_encryption_key,
# and ota_password.
#
# Sizing (either path): roughly one proxy per 2-3 thermostats (each active proxy
# reliably holds ~3 concurrent connections; the integration holds one per
# thermostat). Spread the boards so every thermostat is in good range of one.

substitutions:
  name: bt-proxy-1
  friendly_name: BT Proxy 1

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf   # esp-idf is required for ACTIVE Bluetooth-proxy connections

logger:

# Native API connection to Home Assistant.
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback hotspot for first-time provisioning.
  ap:
    ssid: "${friendly_name} Setup"

captive_portal:

# --- Bluetooth proxy ---
# active: true lets Home Assistant make and HOLD connections through this proxy
# (required for the integration's persistent-connection design). A passive-only
# proxy just relays advertisements and could NOT control the thermostats.
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true
